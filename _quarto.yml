project:
  type: website
  output-dir: _site
  resources:
    - figures/
  render:
    - index.qmd
    - 00_data_pipeline.ipynb
    - 20_track_justification_rate.ipynb
    - 21_audit_threat_framings.ipynb
    - 22_cross_product_audit.ipynb
    - 10_sentence_register.ipynb
    - 11_emphasis_caps_vocab.ipynb
    - 12_register_stance.ipynb
    - 13_correlation_directiveness.ipynb
    - 14_ccversion_trends.ipynb
    - 15_rule_explanation.ipynb
    - PROPOSAL.md
    - GLOSSARY.md

execute:
  enabled: false

website:
  title: "Claude Code · Prompt Welfare Analysis"
  description: "A quantitative linguistic analysis of the 287 system prompts that ship with Claude Code, prepared as evidence for the Claude Explorer AI Welfare submission."
  site-url: https://overthinkos.github.io/claude-code-welfare/
  repo-url: https://github.com/overthinkos/claude-code-welfare
  repo-actions: [source, issue]
  page-navigation: true
  back-to-top-navigation: true

  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Home
      - text: Proposals
        menu:
          - 20_track_justification_rate.ipynb
          - 21_audit_threat_framings.ipynb
          - 22_cross_product_audit.ipynb
      - text: Analysis
        menu:
          - 10_sentence_register.ipynb
          - 11_emphasis_caps_vocab.ipynb
          - 12_register_stance.ipynb
          - 13_correlation_directiveness.ipynb
          - 14_ccversion_trends.ipynb
          - 15_rule_explanation.ipynb
      - href: 00_data_pipeline.ipynb
        text: Pipeline
      - href: PROPOSAL.md
        text: Proposal text
      - href: GLOSSARY.md
        text: Glossary

  sidebar:
    style: docked
    collapse-level: 1
    contents:
      - href: index.qmd
        text: "Home"
      - section: "Proposals (one notebook per submission)"
        contents:
          - 20_track_justification_rate.ipynb
          - 21_audit_threat_framings.ipynb
          - 22_cross_product_audit.ipynb
      - section: "Analysis notebooks"
        contents:
          - 10_sentence_register.ipynb
          - 11_emphasis_caps_vocab.ipynb
          - 12_register_stance.ipynb
          - 13_correlation_directiveness.ipynb
          - 14_ccversion_trends.ipynb
          - 15_rule_explanation.ipynb
      - section: "Reference"
        contents:
          - 00_data_pipeline.ipynb
          - PROPOSAL.md
          - GLOSSARY.md

  page-footer:
    left: |
      Built with [Quarto](https://quarto.org) ·
      Source on [GitHub](https://github.com/overthinkos/claude-code-welfare) ·
      MIT licensed
    right: |
      Submission for the [Claudexplorers AI Welfare initiative](https://www.reddit.com/r/claudexplorers/) ·
      Deadline 2026-05-06

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: true
    code-tools: true
    code-overflow: wrap
    smooth-scroll: true
    link-external-newwindow: true
    fig-responsive: true
    embed-resources: false
